name: Update Wordfence DB

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Build WPProbe
        run: go build -o wpprobe .

      - name: Update Wordfence database
        run: ./wpprobe update-db --api-key "${{ secrets.WORDFENCE_API_KEY }}"

      - name: Create db release if missing
        run: gh release create db --prerelease --title "Vulnerability Database" --notes "Auto-updated Wordfence vulnerability database." 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload database to release
        run: gh release upload db ~/.config/wpprobe/wordfence_vulnerabilities.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
